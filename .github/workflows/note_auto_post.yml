name: note Auto Post

on:
  schedule:
    # 週3回投稿（JST 月・水・金 10:00）
    - cron: '0 1 * * 1'   # 月曜 JST 10:00
    - cron: '0 1 * * 3'   # 水曜 JST 10:00
    - cron: '0 1 * * 5'   # 金曜 JST 10:00
  workflow_dispatch:       # 手動実行も可能

jobs:
  post-to-note:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          sudo apt-get install -y libasound2t64 || true
          playwright install-deps chromium

      - name: Run note auto post
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Upload error screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: logs/*.png
          retention-days: 3
